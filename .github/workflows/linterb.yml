name: Run erblint

on: workflow_call

jobs:
  run-erb-lint:
    name: Run ERB lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@97ecb7b512899eb71ab1bf2310a624c6f1589ac6 # v1.308.0
        with:
          bundler-cache: true

      - name: Run erblint
        run: bundle exec erblint --lint-all
